# docker-compose.test.yml — ephemeral Postgres for integration tests.
#
# Exposes Postgres on host port 5433 to avoid clashing with a developer's
# local Postgres on 5432. Intended for CI and short-lived test runs; no
# persistent volume is declared so data is discarded with the container.

services:
  postgres-test:
    image: postgres:18
    environment:
      POSTGRES_USER: pas
      POSTGRES_PASSWORD: pas_test_password
      POSTGRES_DB: pas_test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pas"]
      interval: 5s
      timeout: 5s
      retries: 10
